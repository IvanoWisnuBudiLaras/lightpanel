name: Build and Deploy LightPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_DEPLOY_PATH: ${{ secrets.SERVER_DEPLOY_PATH }}
          LIGHTPANEL_SERVICE_NAME: ${{ secrets.LIGHTPANEL_SERVICE_NAME }}
        run: |
          set -euo pipefail
          missing=0
          for name in SERVER_HOST SERVER_USER SERVER_PORT SERVER_SSH_KEY SERVER_DEPLOY_PATH LIGHTPANEL_SERVICE_NAME; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required GitHub secret: ${name}"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ]

      - name: Set up Rust stable
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Set up Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build and package release artifact
        run: |
          set -euo pipefail
          bash scripts/package-release.sh

      - name: Prepare SSH key
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$SERVER_SSH_KEY" > "$HOME/.ssh/lightpanel_deploy_key"
          chmod 600 "$HOME/.ssh/lightpanel_deploy_key"
          ssh-keyscan -p "$SERVER_PORT" "$SERVER_HOST" >> "$HOME/.ssh/known_hosts" 2>/dev/null

      - name: Upload artifact and update script
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_DEPLOY_PATH: ${{ secrets.SERVER_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          artifact="dist/lightpanel-linux-x64.tar.gz"
          test -f "$artifact"
          scp -i "$HOME/.ssh/lightpanel_deploy_key" -P "$SERVER_PORT" \
            "$artifact" scripts/self-update.sh \
            "${SERVER_USER}@${SERVER_HOST}:${SERVER_DEPLOY_PATH%/}/"

      - name: Run controlled server update
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_DEPLOY_PATH: ${{ secrets.SERVER_DEPLOY_PATH }}
          LIGHTPANEL_SERVICE_NAME: ${{ secrets.LIGHTPANEL_SERVICE_NAME }}
        run: |
          set -euo pipefail
          remote_dir="${SERVER_DEPLOY_PATH%/}"
          remote_script="${remote_dir}/self-update.sh"
          remote_artifact="${remote_dir}/lightpanel-linux-x64.tar.gz"
          remote_cmd=$(printf 'LIGHTPANEL_SERVICE_NAME=%q bash %q %q' \
            "$LIGHTPANEL_SERVICE_NAME" "$remote_script" "$remote_artifact")
          ssh -i "$HOME/.ssh/lightpanel_deploy_key" -p "$SERVER_PORT" \
            "${SERVER_USER}@${SERVER_HOST}" "$remote_cmd"

